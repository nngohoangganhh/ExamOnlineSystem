spring:
  application:
    name: exam-system-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eduOnl}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:MyVerySecureSecretKeyThatIsAtLeast256BitsLongForJWTSigningPurposesOnly}
  access-token-expiration: 900000        # 15 phút (ms)
#  refresh-token-expiration: 604800000    # 7 ngày (ms)


